<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found - Brew Bliss Café">
    <meta name="theme-color" content="#8B4513">
    <title>404 - Page Not Found | Brew Bliss Café</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-text">Oops! The page you're looking for seems to have wandered off. Let's get you back to something delicious.</p>
            
            <div class="error-search">
                <form class="input-group" onsubmit="event.preventDefault(); window.location.href='menu.html';">
                    <input type="text" class="form-control" placeholder="Search for food, drinks...">
                    <button type="submit" class="btn btn-primary" aria-label="Search">
                        <i class="fas fa-search"></i>
                    </button>
                </form>
            </div>
            
            <div class="error-links">
                <a href="index.html" class="btn btn-primary btn-lg">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <a href="menu.html" class="btn btn-outline-primary btn-lg">
                    <i class="fas fa-utensils"></i> View Menu
                </a>
                <a href="contact.html" class="btn btn-outline-primary btn-lg">
                    <i class="fas fa-envelope"></i> Contact Us
                </a>
            </div>
        </div>
    </div>

    <script src="assets/js/dark-mode.js"></script>
</body>
</html>
